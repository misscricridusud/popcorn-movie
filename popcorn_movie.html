* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; }
input { color: #fff; font-family: inherit; }
input::placeholder { color: #555; }
.row { display: flex; flex-wrap: nowrap; overflow-x: scroll; -webkit-overflow-scrolling: touch; gap: 12px; padding: 4px 18px 12px; }

.poster-wrap { flex: 0 0 auto; width: 110px; cursor: pointer; }
.poster-img { width: 110px; height: 155px; border-radius: 12px; object-fit: cover; display: block; margin-bottom: 7px; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
.poster-placeholder { width: 110px; height: 155px; border-radius: 12px; margin-bottom: 7px; display: flex; align-items: center; justify-content: center; font-size: 36px; border: 1px solid #222; }
.film-title { font-size: 11px; font-weight: 700; color: #ddd; line-height: 1.3; }
.film-year { font-size: 10px; color: #555; margin-top: 2px; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
@keyframes shimmer { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
.shimmer { background: linear-gradient(90deg,#1a1a1a 25%,#2a2a2a 50%,#1a1a1a 75%); background-size:400px 100%; animation:shimmer 1.2s infinite; border-radius:12px; }
</style>

const GENRES=["Tous","Action","Drame","Thriller","Horreur","Fantastique","Comedie","Sci-Fi","Guerre"];
const LABELS={Comedie:"Comédie"};
const EMOJI={Action:"💥",Drame:"🎭",Thriller:"🔪",Horreur:"👻",Fantastique:"✨",Comedie:"😄","Sci-Fi":"🚀",Guerre:"🎖️",Tous:"🎬"};
const COLORS={Action:"#e74c3c",Drame:"#8e44ad",Thriller:"#c0392b",Horreur:"#546e7a",Fantastique:"#2980b9",Comedie:"#f39c12","Sci-Fi":"#16a085",Guerre:"#7f8c8d"};
const MIN_Y=1968, MAX_Y=2024;
const posterCache={};

async function getPoster(tmdbId){
  if(posterCache[tmdbId]!==undefined) return posterCache[tmdbId];
  try{
    const r=await fetch(`https://api.themoviedb.org/3/movie/${tmdbId}?api_key=${TMDB_KEY}&language=fr-FR`);
    const d=await r.json();
    posterCache[tmdbId]=d.poster_path?IMG_BASE+d.poster_path:null;
  }catch{ posterCache[tmdbId]=null; }
  return posterCache[tmdbId];
}

let genre="Tous", yearMin=MIN_Y, yearMax=MAX_Y, search="";
let aiMessages=[{role:"ai",text:"Salut ! Je suis Poppi 🍿\nDis-moi ce que tu veux voir ce soir !"}];
let aiLoading=false;

function lbl(g){return LABELS[g]||g;}
function filteredMovies(g){
  return MOVIES.filter(m=>{
    const gOk=(g||genre)==="Tous"||m.genre===(g||genre);
    const yOk=m.year>=yearMin&&m.year<=yearMax;
    const sOk=!search||m.title.toLowerCase().includes(search.toLowerCase())||String(m.year).includes(search);
    return gOk&&yOk&&sOk;
  });
}

function createCard(m){
  const wrap=document.createElement('div');
  wrap.className='poster-wrap';
  wrap.onclick=()=>openMovie(m.id);

  const ph=document.createElement('div');
  ph.className='poster-placeholder shimmer';
  ph.style.background=`linear-gradient(160deg,${COLORS[m.genre]}66,#111)`;

  const titleEl=document.createElement('div');
  titleEl.className='film-title';
  titleEl.textContent=m.title;
  const yearEl=document.createElement('div');
  yearEl.className='film-year';
  yearEl.textContent=m.year;

  wrap.appendChild(ph);
  wrap.appendChild(titleEl);
  wrap.appendChild(yearEl);

  getPoster(m.tmdb).then(url=>{
    if(url){
      const img=new Image();
      img.className='poster-img';
      img.src=url;
      img.alt=m.title;
      img.onload=()=>ph.replaceWith(img);
      img.onerror=()=>{ph.classList.remove('shimmer');ph.textContent=EMOJI[m.genre];};
    } else {
      ph.classList.remove('shimmer');
      ph.textContent=EMOJI[m.genre];
    }
  });
  return wrap;
}

function fillRow(movies, rowEl){
  rowEl.innerHTML='';
  movies.forEach(m=>rowEl.appendChild(createCard(m)));
  let down=false,sx,sl;
  rowEl.addEventListener('mousedown',e=>{down=true;sx=e.pageX-rowEl.offsetLeft;sl=rowEl.scrollLeft;});
  rowEl.addEventListener('mouseleave',()=>down=false);
  rowEl.addEventListener('mouseup',()=>down=false);
  rowEl.addEventListener('mousemove',e=>{if(!down)return;e.preventDefault();rowEl.scrollLeft=sl-(e.pageX-rowEl.offsetLeft-sx)*1.5;});
}

function renderTabs(){
  const tabs=document.getElementById('genre-tabs');
  tabs.innerHTML='';
  GENRES.forEach(g=>{
    const btn=document.createElement('div');
    btn.style.cssText=`flex:0 0 auto;border-radius:20px;padding:7px 14px;font-size:12px;font-weight:${genre===g?800:600};cursor:pointer;white-space:nowrap;transition:all 0.15s;background:${genre===g?(COLORS[g]||'#f5c518'):'#181818'};color:${genre===g?'#fff':'#777'};border:${genre===g?'none':'1px solid #2a2a2a'};`;
    btn.textContent=`${EMOJI[g]} ${lbl(g)}`;
    btn.onclick=()=>setGenre(g);
    tabs.appendChild(btn);
  });
}

function renderContent(){
  const content=document.getElementById('content');
  const total=filteredMovies("Tous").length;
  document.getElementById('film-count').textContent=total+' film'+(total>1?'s':'');
  renderYearBtn();
  content.innerHTML='';

  if(search){
    const movies=filteredMovies("Tous");
    const lbl2=document.createElement('div');
    lbl2.style.cssText='margin-bottom:12px;color:#777;font-size:13px;padding:0 2px;';
    lbl2.innerHTML=`${movies.length} film${movies.length>1?'s':''} pour "<span style="color:#f5c518">${search}</span>"`;
    const row=document.createElement('div');
    row.className='row';
    row.style.paddingLeft='0';
    content.appendChild(lbl2);
    content.appendChild(row);
    fillRow(movies,row);
    return;
  }

  if(genre==="Tous"){
    GENRES.filter(g=>g!=="Tous").forEach(g=>{
      const mv=filteredMovies(g);
      if(!mv.length) return;
      const sec=document.createElement('div');
      sec.style.marginBottom='28px';
      const hdr=document.createElement('div');
      hdr.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:0 2px;margin-bottom:10px;';
      hdr.innerHTML=`<span style="font-weight:800;font-size:15px;"><span style="color:${COLORS[g]}">${EMOJI[g]}</span> ${lbl(g)} <span style="color:#444;font-size:11px;">${mv.length} films</span></span><button style="background:none;border:none;color:#555;font-size:13px;cursor:pointer;">Tout voir ›</button>`;
      hdr.querySelector('button').onclick=()=>setGenre(g);
      const row=document.createElement('div');
      row.className='row';
      sec.appendChild(hdr);
      sec.appendChild(row);
      content.appendChild(sec);
      fillRow(mv,row);
    });
  } else {
    const movies=filteredMovies();
    const hdr=document.createElement('div');
    hdr.style.cssText='margin-bottom:14px;padding:0 2px;';
    hdr.innerHTML=`<span style="font-weight:800;font-size:16px;color:${COLORS[genre]||'#fff'}">${EMOJI[genre]} ${lbl(genre)}</span> <span style="color:#444;font-size:12px;">${movies.length} films</span>`;
    content.appendChild(hdr);
    if(!movies.length){
      const empty=document.createElement('div');
      empty.style.cssText='text-align:center;padding:60px 0;color:#333;';
      empty.innerHTML='<div style="font-size:48px;">🍿</div><div style="font-size:14px;margin-top:10px;">Aucun film</div>';
      content.appendChild(empty);
    } else {
      const row=document.createElement('div');
      row.className='row';
      row.style.paddingLeft='0';
      content.appendChild(row);
      fillRow(movies,row);
    }
  }
}

function setGenre(g){
  genre=g; search='';
  const si=document.getElementById('search-input');
  if(si){si.value='';document.getElementById('search-clear').style.display='none';}
  renderTabs(); renderContent();
}

// Modal film
window.openMovie=async function(id){
  const m=MOVIES.find(x=>x.id===id);
  if(!m) return;
  document.getElementById('movie-modal')?.remove();
  const el=document.createElement('div');
  el.id='movie-modal';
  el.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:200;display:flex;align-items:flex-end;';
  const url=await getPoster(m.tmdb);
  const posterHtml=url
    ?`<img src="${url}" style="width:100px;height:140px;border-radius:12px;object-fit:cover;box-shadow:0 4px 20px rgba(0,0,0,0.7);flex-shrink:0;">`
    :`<div style="width:100px;height:140px;border-radius:12px;background:linear-gradient(160deg,${COLORS[m.genre]}88,#111);display:flex;align-items:center;justify-content:center;font-size:40px;flex-shrink:0;">${EMOJI[m.genre]}</div>`;
  el.innerHTML=`
    <div style="background:#141414;width:100%;max-width:420px;margin:0 auto;border-radius:24px 24px 0 0;overflow:hidden;max-height:92vh;overflow-y:auto;">
      <div style="background:linear-gradient(160deg,${COLORS[m.genre]}44,#0a0a0a);padding:28px 22px 20px;display:flex;gap:16px;align-items:flex-start;">
        ${posterHtml}
        <div style="flex:1;padding-top:4px;">
          <div style="color:#fff;font-weight:800;font-size:18px;line-height:1.2;margin-bottom:6px;">${m.title}</div>
          <div style="color:rgba(255,255,255,0.5);font-size:12px;margin-bottom:8px;">${m.year}</div>
          <div style="color:#f5c518;font-size:14px;margin-bottom:10px;">${'★'.repeat(Math.round(m.rating/2))}${'☆'.repeat(5-Math.round(m.rating/2))} <span style="color:#666;font-size:12px;">${m.rating}/10</span></div>
          <div style="display:inline-block;background:${COLORS[m.genre]}33;color:${COLORS[m.genre]};font-size:10px;padding:3px 10px;border-radius:18px;font-weight:700;border:1px solid ${COLORS[m.genre]}55;">${EMOJI[m.genre]} ${lbl(m.genre)}</div>
        </div>
      </div>
      <div style="padding:20px 22px 36px;">
        <div style="color:#aaa;font-size:14px;line-height:1.7;">${m.desc}</div>
        <button id="close-btn" style="margin-top:24px;width:100%;background:#f5c518;color:#000;border:none;border-radius:14px;padding:13px;font-size:15px;font-weight:800;cursor:pointer;">Fermer</button>
      </div>
    </div>`;
  document.body.appendChild(el);
  el.onclick=()=>el.remove();
  document.getElementById('close-btn').onclick=e=>{e.stopPropagation();el.remove();};
};

// Year modal
function renderYearBtn(){
  const ya=yearMin!==MIN_Y||yearMax!==MAX_Y;
  const btn=document.getElementById('year-btn');
  if(!btn) return;
  btn.textContent=`🗓️ ${ya?yearMin+' – '+yearMax:'Années'}${ya?' ×':''}`;
  btn.style.cssText=`background:${ya?'#f5c518':'#181818'};border:${ya?'none':'1px solid #2a2a2a'};border-radius:20px;color:${ya?'#000':'#666'};padding:5px 13px;cursor:pointer;font-size:12px;font-weight:${ya?800:400};`;
  btn.onclick=ya?()=>{yearMin=MIN_Y;yearMax=MAX_Y;renderContent();}:openYear;
}

function openYear(){
  document.getElementById('year-modal')?.remove();
  const pct=v=>(v-MIN_Y)/(MAX_Y-MIN_Y)*100;
  const decades=[1970,1980,1990,2000,2010,2020];
  const el=document.createElement('div');
  el.id='year-modal';
  el.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:300;display:flex;align-items:flex-end;';
  el.innerHTML=`
    <div style="background:#141414;width:100%;max-width:420px;margin:0 auto;border-radius:24px 24px 0 0;padding:22px 22px 36px;">
      <div style="width:36px;height:4px;background:#333;border-radius:2px;margin:0 auto 18px;"></div>
      <div style="font-weight:800;font-size:16px;margin-bottom:6px;">🗓️ Filtrer par année</div>
      <div id="yl" style="color:#f5c518;font-weight:800;font-size:22px;text-align:center;margin-bottom:18px;">${yearMin} — ${yearMax}</div>
      <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:22px;">
        <button onclick="yd(${MIN_Y},${MAX_Y})" style="background:#222;border:none;border-radius:18px;color:#aaa;padding:5px 12px;font-size:11px;cursor:pointer;font-weight:600;">Tout</button>
        ${decades.map(d=>`<button onclick="yd(${d},${Math.min(d+9,MAX_Y)})" style="background:#222;border:none;border-radius:18px;color:#aaa;padding:5px 12px;font-size:11px;cursor:pointer;font-weight:600;">${d}s</button>`).join('')}
      </div>
      <div style="position:relative;height:36px;margin-bottom:6px;">
        <div style="position:absolute;top:50%;left:0;right:0;height:4px;background:#333;border-radius:2px;transform:translateY(-50%);"></div>
        <div id="yf" style="position:absolute;top:50%;height:4px;background:#f5c518;border-radius:2px;transform:translateY(-50%);left:${pct(yearMin)}%;width:${pct(yearMax)-pct(yearMin)}%;"></div>
        <input id="ya" type="range" min="${MIN_Y}" max="${MAX_Y}" value="${yearMin}" oninput="yum(this.value)" style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:36px;z-index:2;">
        <input id="yb" type="range" min="${MIN_Y}" max="${MAX_Y}" value="${yearMax}" oninput="yux(this.value)" style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:36px;z-index:2;">
        <div id="yt1" style="position:absolute;top:50%;left:${pct(yearMin)}%;transform:translate(-50%,-50%);width:22px;height:22px;border-radius:50%;background:#f5c518;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.6);pointer-events:none;z-index:1;"></div>
        <div id="yt2" style="position:absolute;top:50%;left:${pct(yearMax)}%;transform:translate(-50%,-50%);width:22px;height:22px;border-radius:50%;background:#f5c518;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.6);pointer-events:none;z-index:1;"></div>
      </div>
      <div style="display:flex;justify-content:space-between;color:#444;font-size:10px;margin-bottom:22px;"><span>${MIN_Y}</span><span>${MAX_Y}</span></div>
      <button id="ya-apply" style="width:100%;background:#f5c518;color:#000;border:none;border-radius:14px;padding:13px;font-size:15px;font-weight:800;cursor:pointer;">Appliquer</button>
      <button onclick="document.getElementById('year-modal').remove()" style="width:100%;background:none;color:#555;border:none;padding:8px;cursor:pointer;margin-top:4px;font-size:13px;">Annuler</button>
    </div>`;
  document.body.appendChild(el);
  el.onclick=e=>{if(e.target===el)el.remove();};
  document.getElementById('ya-apply').onclick=()=>{
    yearMin=parseInt(document.getElementById('ya').value);
    yearMax=parseInt(document.getElementById('yb').value);
    el.remove(); renderContent();
  };
}
window.yum=function(v){const b=parseInt(document.getElementById('yb').value),val=Math.min(parseInt(v),b-1),p=x=>(x-MIN_Y)/(MAX_Y-MIN_Y)*100;document.getElementById('ya').value=val;document.getElementById('yl').textContent=val+' — '+b;document.getElementById('yt1').style.left=p(val)+'%';document.getElementById('yf').style.left=p(val)+'%';document.getElementById('yf').style.width=(p(b)-p(val))+'%';};
window.yux=function(v){const a=parseInt(document.getElementById('ya').value),val=Math.max(parseInt(v),a+1),p=x=>(x-MIN_Y)/(MAX_Y-MIN_Y)*100;document.getElementById('yb').value=val;document.getElementById('yl').textContent=a+' — '+val;document.getElementById('yt2').style.left=p(val)+'%';document.getElementById('yf').style.width=(p(val)-p(a))+'%';};
window.yd=function(min,max){const p=x=>(x-MIN_Y)/(MAX_Y-MIN_Y)*100;document.getElementById('ya').value=min;document.getElementById('yb').value=max;document.getElementById('yl').textContent=min+' — '+max;document.getElementById('yt1').style.left=p(min)+'%';document.getElementById('yt2').style.left=p(max)+'%';document.getElementById('yf').style.left=p(min)+'%';document.getElementById('yf').style.width=(p(max)-p(min))+'%';};

// Poppi AI
async function sendPoppi(txt){
  if(aiLoading||!txt.trim())return;
  aiMessages.push({role:"user",text:txt});
  aiLoading=true; renderAIChat();
  const ml=MOVIES.map(m=>`${m.title} (${m.year}, ${m.genre}, ★${m.rating})`).join(', ');
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,
        system:`Tu es Poppi, assistant cinéma de Popcorn Movie 🍿. Réponds en français, chaleureux et enthousiaste. Films dispo: ${ml}. Mets titres entre [[doubles crochets]]. Max 3 recommandations.`,
        messages:aiMessages.filter(m=>m.role!=="ai").map(m=>({role:m.role==="user"?"user":"assistant",content:m.text}))})});
    const d=await r.json();
    aiMessages.push({role:"ai",text:d.content?.map(b=>b.text||"").join("")||"Oups 🍿"});
  }catch{aiMessages.push({role:"ai",text:"Connexion perdue 🍿 Réessaie !"});}
  aiLoading=false; renderAIChat();
}
function renderAIChat(){
  const chat=document.getElementById('ai-chat');
  if(!chat) return;
  chat.innerHTML=aiMessages.map(m=>`
    <div style="display:flex;justify-content:${m.role==='user'?'flex-end':'flex-start'};gap:8px;align-items:flex-end;margin-bottom:10px;">
      ${m.role==='ai'?'<div style="width:26px;height:26px;border-radius:50%;background:#f5c518;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;">🍿</div>':''}
      <div style="max-width:78%;background:${m.role==='user'?'#f5c518':'#1e1e1e'};color:${m.role==='user'?'#000':'#fff'};border-radius:${m.role==='user'?'18px 18px 4px 18px':'18px 18px 18px 4px'};padding:9px 13px;font-size:13px;line-height:1.5;border:${m.role==='ai'?'1px solid #2a2a2a':'none'};">
        ${m.role==='ai'?m.text.replace(/\[\[(.+?)\]\]/g,'<b style="background:#f5c518;color:#000;padding:1px 8px;border-radius:10px;cursor:pointer;">$1</b>').replace(/\n/g,'<br>'):m.text}
      </div>
    </div>`).join('')+(aiLoading?`<div style="display:flex;gap:5px;padding:10px;background:#1e1e1e;border-radius:18px;width:fit-content;margin-bottom:10px;">${[0,.2,.4].map(d=>`<div style="width:7px;height:7px;border-radius:50%;background:#f5c518;animation:bounce 1s ${d}s infinite;"></div>`).join('')}</div>`:'');
  chat.scrollTop=chat.scrollHeight;
}
function openAI(){
  document.getElementById('ai-overlay')?.remove();
  const el=document.createElement('div');
  el.id='ai-overlay';
  el.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:200;display:flex;flex-direction:column;';
  el.innerHTML=`
    <div style="background:#111;padding:14px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #222;flex-shrink:0;">
      <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#f5c518,#e6a800);display:flex;align-items:center;justify-content:center;font-size:20px;">🍿</div>
      <div><div style="font-weight:800;font-size:16px;">Poppi</div><div style="color:#f5c518;font-size:11px;">Ton assistant cinéma</div></div>
      <button onclick="document.getElementById('ai-overlay').remove()" style="margin-left:auto;background:none;border:none;color:#666;font-size:24px;cursor:pointer;">✕</button>
    </div>
    <div id="ai-chat" style="flex:1;overflow-y:auto;padding:14px;background:#0a0a0a;"></div>
    <div style="display:flex;gap:8px;overflow-x:auto;padding:8px 14px;background:#0a0a0a;flex-shrink:0;">
      ${["Film action 80s 🔥","Thriller haletant 😰","Quelque chose de drôle 😂","Classique 70s 🎞️"].map(s=>`<button onclick="qs('${s.replace(/'/g,"\\'")}')" style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:18px;color:#bbb;padding:6px 12px;font-size:11px;cursor:pointer;white-space:nowrap;flex-shrink:0;">${s}</button>`).join('')}
    </div>
    <div style="background:#111;padding:10px 14px;display:flex;gap:8px;border-top:1px solid #222;flex-shrink:0;">
      <input id="ai-input" placeholder="Parle à Poppi…" style="flex:1;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:22px;padding:10px 15px;font-size:13px;outline:none;color:#fff;">
      <button id="ai-send" style="background:#f5c518;border:none;border-radius:50%;width:40px;height:40px;cursor:pointer;font-size:16px;color:#000;">➤</button>
    </div>`;
  document.body.appendChild(el);
  const inp=document.getElementById('ai-input');
  document.getElementById('ai-send').onclick=()=>{sendPoppi(inp.value);inp.value='';};
  inp.onkeydown=e=>{if(e.key==='Enter'){sendPoppi(inp.value);inp.value='';}};
  renderAIChat();
}
window.qs=t=>sendPoppi(t);

// Shell
document.getElementById('root').innerHTML=`
  <div style="background:#0f0f0f;padding:16px 18px 0;position:sticky;top:0;z-index:50;border-bottom:1px solid #1a1a1a;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:13px;">
      <div>
        <div style="font-size:18px;font-weight:900;">🍿 <span style="color:#f5c518">Popcorn</span> Movie</div>
        <div style="color:#444;font-size:10px;margin-top:1px;">Films américains</div>
      </div>
      <button onclick="openAI()" style="background:linear-gradient(135deg,#f5c518,#e6a800);border:none;border-radius:22px;color:#000;padding:7px 15px;cursor:pointer;font-weight:800;font-size:12px;">🍿 Poppi</button>
    </div>
    <div style="position:relative;margin-bottom:11px;">
      <span style="position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#555;">🔍</span>
      <input id="search-input" placeholder="Titre, année…" style="width:100%;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:22px;padding:9px 36px 9px 36px;font-size:13px;outline:none;">
      <button id="search-clear" style="display:none;position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;color:#555;cursor:pointer;font-size:17px;">✕</button>
    </div>
    <div id="genre-tabs" class="genre-tabs"></div>
  </div>
  <div style="background:#0d0d0d;padding:8px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #181818;">
    <button id="year-btn"></button>
    <span id="film-count" style="color:#444;font-size:11px;"></span>
  </div>
  <div id="content" style="padding:18px 18px 90px;"></div>
  <div style="position:fixed;bottom:0;left:0;right:0;background:rgba(12,12,12,0.97);border-top:1px solid #1e1e1e;display:flex;padding:9px 0 16px;z-index:50;">
    <button onclick="setGenre('Tous')" style="flex:1;background:none;border:none;color:#555;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;font-size:20px;">🏠<span style="font-size:9px;color:#444">Accueil</span></button>
    <button onclick="document.getElementById('search-input').focus()" style="flex:1;background:none;border:none;color:#555;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;font-size:20px;">🔍<span style="font-size:9px;color:#444">Recherche</span></button>
    <button onclick="openAI()" style="flex:1;background:none;border:none;color:#555;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;font-size:20px;">🍿<span style="font-size:9px;color:#444">Poppi</span></button>
  </div>`;

const si=document.getElementById('search-input');
const sc=document.getElementById('search-clear');
si.oninput=()=>{search=si.value;sc.style.display=search?'block':'none';genre="Tous";renderTabs();renderContent();};
sc.onclick=()=>{si.value='';search='';sc.style.display='none';renderTabs();renderContent();};

renderTabs();
renderContent();
</script>
