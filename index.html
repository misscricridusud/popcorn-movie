const GENRES=["Tous","Années 70","Années 80","Années 90","Années 2000","Années 2010","Années 2020","Action","Drame","Thriller","Horreur","Fantastique","Comedie","Sci-Fi","Guerre"];
const DECADE_MAP={"Années 70":[1970,1979],"Années 80":[1980,1989],"Années 90":[1990,1999],"Années 2000":[2000,2009],"Années 2010":[2010,2019],"Années 2020":[2020,2029]};
const LABELS={Comedie:"Comédie","Années 70":"Années 70","Années 80":"Années 80","Années 90":"Années 90","Années 2000":"Années 2000","Années 2010":"Années 2010","Années 2020":"Années 2020"};
const EMOJI={Action:"💥",Drame:"🎭",Thriller:"🔪",Horreur:"👻",Fantastique:"✨",Comedie:"😄","Sci-Fi":"🚀",Guerre:"🎖️",Tous:"🎬","Années 70":"📽️","Années 80":"🕹️","Années 90":"📼","Années 2000":"💿","Années 2010":"📱","Années 2020":"🍿"};
const COLORS={Action:"#e74c3c",Drame:"#8e44ad",Thriller:"#c0392b",Horreur:"#546e7a",Fantastique:"#2980b9",Comedie:"#f39c12","Sci-Fi":"#16a085",Guerre:"#7f8c8d","Années 70":"#d4a017","Années 80":"#e91e8c","Années 90":"#00bcd4","Années 2000":"#4caf50","Années 2010":"#9c27b0","Années 2020":"#f5c518"};

const posterCache={};
async function getPoster(tmdbId,title,year){
  const key=title+'_'+year;
  if(posterCache[key]!==undefined) return posterCache[key];
  try{
    const r=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(title)}&year=${year}&language=fr-FR`);
    const d=await r.json();
    const film=d.results?.[0];
    posterCache[key]=film?.poster_path?IMG+film.poster_path:null;
  }catch{posterCache[key]=null;}
  return posterCache[key];
}

let activeTab="Tous", search="";
function lbl(g){return LABELS[g]||g;}

function getMovies(tab){
  return MOVIES.filter(m=>{
    const decade=DECADE_MAP[tab||activeTab];
    const tabOk=(tab||activeTab)==="Tous"
      ||(decade&&m.year>=decade[0]&&m.year<=decade[1])
      ||(!decade&&(tab||activeTab)!=="Tous"&&m.genre===(tab||activeTab));
    const sOk=!search||m.title.toLowerCase().includes(search.toLowerCase())||String(m.year).includes(search);
    return tabOk&&sOk;
  });
}

function createCard(m){
  const wrap=document.createElement('div');
  wrap.className='pw';
  wrap.onclick=()=>openMovie(m.id);
  const ph=document.createElement('div');
  ph.className='pp sh';
  ph.style.background=`linear-gradient(160deg,${COLORS[m.genre]||'#333'}66,#111)`;
  const t=document.createElement('div');t.className='ft';t.textContent=m.title;
  const y=document.createElement('div');y.className='fy';y.textContent=m.year;
  wrap.append(ph,t,y);
  getPoster(m.tmdb,m.title,m.year).then(url=>{
    if(url){const img=new Image();img.className='pi';img.src=url;img.alt=m.title;img.onload=()=>ph.replaceWith(img);img.onerror=()=>{ph.classList.remove('sh');ph.textContent=EMOJI[m.genre]||'🎬';};}
    else{ph.classList.remove('sh');ph.textContent=EMOJI[m.genre]||'🎬';}
  });
  return wrap;
}

function fillRow(movies,rowEl){
  rowEl.innerHTML='';
  movies.forEach(m=>rowEl.appendChild(createCard(m)));
  let down=false,sx,sl;
  rowEl.addEventListener('mousedown',e=>{down=true;sx=e.pageX-rowEl.offsetLeft;sl=rowEl.scrollLeft;});
  rowEl.addEventListener('mouseleave',()=>down=false);
  rowEl.addEventListener('mouseup',()=>down=false);
  rowEl.addEventListener('mousemove',e=>{if(!down)return;e.preventDefault();rowEl.scrollLeft=sl-(e.pageX-rowEl.offsetLeft-sx)*1.5;});
}

function renderTabs(){
  const tabs=document.getElementById('tabs');
  tabs.innerHTML='';
  GENRES.forEach(g=>{
    const btn=document.createElement('div');
    btn.style.cssText=`flex:0 0 auto;border-radius:20px;padding:7px 14px;font-size:12px;font-weight:${activeTab===g?800:600};cursor:pointer;white-space:nowrap;background:${activeTab===g?(COLORS[g]||'#f5c518'):'#181818'};color:${activeTab===g?'#fff':'#777'};border:${activeTab===g?'none':'1px solid #2a2a2a'};`;
    btn.textContent=`${EMOJI[g]||'🎬'} ${lbl(g)}`;
    btn.onclick=()=>setTab(g);
    tabs.appendChild(btn);
  });
}

function renderContent(){
  const content=document.getElementById('content');
  const total=getMovies("Tous").length;
  document.getElementById('film-count').textContent=total+' film'+(total>1?'s':'');
  content.innerHTML='';

  if(search){
    const mv=getMovies("Tous");
    const lbl2=document.createElement('div');
    lbl2.style.cssText='margin-bottom:12px;color:#777;font-size:13px;padding:0 2px;';
    lbl2.innerHTML=`${mv.length} résultat${mv.length>1?'s':''} pour "<span style="color:#f5c518">${search}</span>"`;
    const row=document.createElement('div');row.className='row';row.style.paddingLeft='0';
    content.append(lbl2,row);fillRow(mv,row);return;
  }

  if(activeTab==="Tous"){
    // Affiche les décennies puis les genres
    const decades=["Années 70","Années 80","Années 90","Années 2000","Années 2010","Années 2020"];
    const genreList=["Action","Drame","Thriller","Horreur","Fantastique","Comedie","Sci-Fi","Guerre"];
    [...decades,...genreList].forEach(g=>{
      const mv=getMovies(g);
      if(!mv.length) return;
      const sec=document.createElement('div');sec.style.marginBottom='28px';
      const hdr=document.createElement('div');
      hdr.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:0 2px;margin-bottom:10px;';
      hdr.innerHTML=`<span style="font-weight:800;font-size:15px;"><span style="color:${COLORS[g]}">${EMOJI[g]||'🎬'}</span> ${lbl(g)} <span style="color:#444;font-size:11px;">${mv.length} films</span></span><button style="background:none;border:none;color:#555;font-size:13px;cursor:pointer;">Tout voir ›</button>`;
      hdr.querySelector('button').onclick=()=>setTab(g);
      const row=document.createElement('div');row.className='row';
      sec.append(hdr,row);content.appendChild(sec);fillRow(mv,row);
    });
  } else {
    const mv=getMovies();
    const hdr=document.createElement('div');
    hdr.style.cssText='margin-bottom:14px;padding:0 2px;';
    hdr.innerHTML=`<span style="font-weight:800;font-size:16px;color:${COLORS[activeTab]||'#fff'}">${EMOJI[activeTab]||'🎬'} ${lbl(activeTab)}</span> <span style="color:#444;font-size:12px;">${mv.length} films</span>`;
    content.appendChild(hdr);
    if(!mv.length){
      content.innerHTML+='<div style="text-align:center;padding:60px 0;color:#333;"><div style="font-size:48px;">🍿</div><div style="font-size:14px;margin-top:10px;">Aucun film</div></div>';
    } else {
      const row=document.createElement('div');row.className='row';row.style.paddingLeft='0';
      content.appendChild(row);fillRow(mv,row);
    }
  }
}

function setTab(g){
  activeTab=g;search='';
  const si=document.getElementById('si');if(si){si.value='';document.getElementById('sc').style.display='none';}
  renderTabs();renderContent();
}

// Modal film
window.openMovie=async function(id){
  const m=MOVIES.find(x=>x.id===id);if(!m)return;
  document.getElementById('mm')?.remove();
  const el=document.createElement('div');el.id='mm';
  el.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:200;display:flex;align-items:flex-end;';
  const url=await getPoster(m.tmdb,m.title,m.year);
  const ph=url?`<img src="${url}" style="width:100px;height:140px;border-radius:12px;object-fit:cover;box-shadow:0 4px 20px rgba(0,0,0,0.7);flex-shrink:0;">`
    :`<div style="width:100px;height:140px;border-radius:12px;background:linear-gradient(160deg,${COLORS[m.genre]||'#333'}88,#111);display:flex;align-items:center;justify-content:center;font-size:40px;flex-shrink:0;">${EMOJI[m.genre]||'🎬'}</div>`;
  el.innerHTML=`<div style="background:#141414;width:100%;max-width:430px;margin:0 auto;border-radius:24px 24px 0 0;overflow:hidden;max-height:92vh;overflow-y:auto;">
    <div style="background:linear-gradient(160deg,${COLORS[m.genre]||'#333'}44,#0a0a0a);padding:28px 22px 20px;display:flex;gap:16px;align-items:flex-start;">
      ${ph}
      <div style="flex:1;padding-top:4px;">
        <div style="color:#fff;font-weight:800;font-size:18px;line-height:1.2;margin-bottom:6px;">${m.title}</div>
        <div style="color:rgba(255,255,255,0.5);font-size:12px;margin-bottom:8px;">${m.year}</div>
        <div style="color:#f5c518;font-size:14px;margin-bottom:10px;">${'★'.repeat(Math.round(m.rating/2))}${'☆'.repeat(5-Math.round(m.rating/2))} <span style="color:#666;font-size:12px;">${m.rating}/10</span></div>
        <div style="display:inline-block;background:${COLORS[m.genre]||'#333'}33;color:${COLORS[m.genre]||'#aaa'};font-size:10px;padding:3px 10px;border-radius:18px;font-weight:700;border:1px solid ${COLORS[m.genre]||'#333'}55;">${EMOJI[m.genre]||'🎬'} ${lbl(m.genre)}</div>
      </div>
    </div>
    <div style="padding:20px 22px 36px;">
      <div style="color:#aaa;font-size:14px;line-height:1.7;">${m.desc}</div>
      <button id="cb" style="margin-top:24px;width:100%;background:#f5c518;color:#000;border:none;border-radius:14px;padding:13px;font-size:15px;font-weight:800;cursor:pointer;">Fermer</button>
    </div>
  </div>`;
  document.body.appendChild(el);
  el.onclick=()=>el.remove();
  document.getElementById('cb').onclick=e=>{e.stopPropagation();el.remove();};
};

  const ml=MOVIES.map(m=>`${m.title} (${m.year}, ${m.genre}, ★${m.rating})`).join(', ');
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,
        system:`Tu es Poppi, assistant cinéma de Popcorn Movie 🍿. Réponds en français, chaleureux. Films dispo: ${ml}. Mets titres entre [[doubles crochets]]. Max 3 recommandations.`,
        messages:aiMsg.filter(m=>m.role!=="ai").map(m=>({role:m.role==="user"?"user":"assistant",content:m.text}))})});
    const d=await r.json();
    aiMsg.push({role:"ai",text:d.content?.map(b=>b.text||"").join("")||"Oups 🍿"});
  }catch{aiMsg.push({role:"ai",text:"Connexion perdue 🍿"});}
  aiLoad=false;renderChat();
}
function renderChat(){
  const c=document.getElementById('ac');if(!c)return;
  c.innerHTML=aiMsg.map(m=>`<div style="display:flex;justify-content:${m.role==='user'?'flex-end':'flex-start'};gap:8px;align-items:flex-end;margin-bottom:10px;">
    ${m.role==='ai'?'<div style="width:26px;height:26px;border-radius:50%;background:#f5c518;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;">🍿</div>':''}
    <div style="max-width:78%;background:${m.role==='user'?'#f5c518':'#1e1e1e'};color:${m.role==='user'?'#000':'#fff'};border-radius:${m.role==='user'?'18px 18px 4px 18px':'18px 18px 18px 4px'};padding:9px 13px;font-size:13px;line-height:1.5;border:${m.role==='ai'?'1px solid #2a2a2a':'none'};">
      ${m.role==='ai'?m.text.replace(/\[\[(.+?)\]\]/g,'<b style="background:#f5c518;color:#000;padding:1px 8px;border-radius:10px;">$1</b>').replace(/\n/g,'<br>'):m.text}
    </div></div>`).join('')+(aiLoad?`<div style="display:flex;gap:5px;padding:10px;background:#1e1e1e;border-radius:18px;width:fit-content;">${[0,.2,.4].map(d=>`<div style="width:7px;height:7px;border-radius:50%;background:#f5c518;animation:bounce 1s ${d}s infinite;"></div>`).join('')}</div>`:'');
  c.scrollTop=c.scrollHeight;
}
function openAI(){
  document.getElementById('ao')?.remove();
  const el=document.createElement('div');el.id='ao';
  el.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:200;display:flex;flex-direction:column;';
  el.innerHTML=`
    <div style="background:#111;padding:14px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #222;flex-shrink:0;">
      <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#f5c518,#e6a800);display:flex;align-items:center;justify-content:center;font-size:20px;">🍿</div>
      <div><div style="font-weight:800;font-size:16px;">Poppi</div><div style="color:#f5c518;font-size:11px;">Ton assistant cinéma</div></div>
      <button onclick="document.getElementById('ao').remove()" style="margin-left:auto;background:none;border:none;color:#666;font-size:24px;cursor:pointer;">✕</button>
    </div>
    <div id="ac" style="flex:1;overflow-y:auto;padding:14px;background:#0a0a0a;"></div>
    <div style="display:flex;gap:8px;overflow-x:auto;padding:8px 14px;background:#0a0a0a;flex-shrink:0;">
      ${["Film des années 70 🎞️","Action 80s 🔥","Thriller 90s 😰","Chef-d'œuvre 2000s 🏆","Classique guerre 🎖️"].map(s=>`<button onclick="qs('${s.replace(/'/g,"\\'")}')" style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:18px;color:#bbb;padding:6px 12px;font-size:11px;cursor:pointer;white-space:nowrap;flex-shrink:0;">${s}</button>`).join('')}
    </div>
    <div style="background:#111;padding:10px 14px;display:flex;gap:8px;border-top:1px solid #222;flex-shrink:0;">
      <input id="ai" placeholder="Parle à Poppi…" style="flex:1;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:22px;padding:10px 15px;font-size:13px;outline:none;color:#fff;">
      <button id="as" style="background:#f5c518;border:none;border-radius:50%;width:40px;height:40px;cursor:pointer;font-size:16px;color:#000;">➤</button>
    </div>`;
  document.body.appendChild(el);
  const inp=document.getElementById('ai');
  document.getElementById('as').onclick=()=>{sendPoppi(inp.value);inp.value='';};
  inp.onkeydown=e=>{if(e.key==='Enter'){sendPoppi(inp.value);inp.value='';}};
  renderChat();
}
window.qs=t=>sendPoppi(t);

// Shell
document.getElementById('root').innerHTML=`
  <div style="background:#0f0f0f;padding:16px 18px 0;position:sticky;top:0;z-index:50;border-bottom:1px solid #1a1a1a;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:13px;">
      <div>
        <div style="font-size:18px;font-weight:900;">🍿 <span style="color:#f5c518">Popcorn</span> Movie</div>
        <div style="color:#444;font-size:10px;margin-top:1px;">${MOVIES.length} films américains</div>
      </div>
      <button onclick="openAI()" style="background:linear-gradient(135deg,#f5c518,#e6a800);border:none;border-radius:22px;color:#000;padding:7px 15px;cursor:pointer;font-weight:800;font-size:12px;">🍿 Poppi</button>
    </div>
    <div style="position:relative;margin-bottom:11px;">
      <span style="position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#555;">🔍</span>
      <input id="si" placeholder="Titre, année, genre…" style="width:100%;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:22px;padding:9px 36px 9px 36px;font-size:13px;outline:none;">
      <button id="sc" style="display:none;position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;color:#555;cursor:pointer;font-size:17px;">✕</button>
    </div>
    <div id="tabs" class="tabs"></div>
  </div>
  <div style="background:#0d0d0d;padding:8px 18px;border-bottom:1px solid #181818;">
    <span id="film-count" style="color:#444;font-size:11px;"></span>
  </div>
  <div id="content" style="padding:18px 18px 90px;"></div>
  <div style="position:fixed;bottom:0;left:0;right:0;background:rgba(12,12,12,0.97);border-top:1px solid #1e1e1e;display:flex;padding:9px 0 16px;z-index:50;">
    <button onclick="setTab('Tous')" style="flex:1;background:none;border:none;color:#555;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;font-size:20px;">🏠<span style="font-size:9px;color:#444">Accueil</span></button>
    <button onclick="document.getElementById('si').focus()" style="flex:1;background:none;border:none;color:#555;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;font-size:20px;">🔍<span style="font-size:9px;color:#444">Recherche</span></button>
    <button onclick="openAI()" style="flex:1;background:none;border:none;color:#555;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;font-size:20px;">🍿<span style="font-size:9px;color:#444">Poppi</span></button>
  </div>`;

const si=document.getElementById('si'),sc=document.getElementById('sc');
si.oninput=()=>{search=si.value;sc.style.display=search?'block':'none';activeTab="Tous";renderTabs();renderContent();};
sc.onclick=()=>{si.value='';search='';sc.style.display='none';renderTabs();renderContent();};
renderTabs();renderContent();
</script>
</body>
</html>
